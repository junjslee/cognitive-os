name: Bug report
description: Report broken behavior in episteme
labels: [bug]
body:
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and confirmed this is not a duplicate
          required: true
  - type: input
    id: version
    attributes:
      label: episteme version
      placeholder: e.g. 0.2.0
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: macOS/Linux, Python version, shell
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the exact broken behavior.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: failure_mode
    attributes:
      label: Kernel alignment
      description: |
        Optional but valuable — answer any that apply:
        - Which of the six failure modes does this bug expose (if any)? See kernel/FAILURE_MODES.md.
        - Which counter artifact failed or was absent — Unknowns, Core Question, Disconfirmation, facts/inferences split, failure-first check, or Assumptions?
        - Is this a bug in the kernel, an adapter, a CLI command, or the operator profile schema? The layer matters for scoping the fix.
    validations:
      required: false
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Paste command output, logs, stack traces, or screenshots.
    validations:
      required: false

<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760" role="img" aria-label="cognitive-os system structure overview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b0d12"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#8ea0bf"/>
    </marker>
    <style>
      .title{font:700 34px Inter,Segoe UI,Arial,sans-serif;fill:#f8fafc}
      .sub{font:500 15px Inter,Segoe UI,Arial,sans-serif;fill:#b8c6e0}
      .panel{fill:#121a2a;stroke:#2a3a56;stroke-width:2;rx:14}
      .panel2{fill:#0f1c22;stroke:#2f5561;stroke-width:2;rx:14}
      .panel3{fill:#17152a;stroke:#4b3a7a;stroke-width:2;rx:14}
      .h{font:700 18px Inter,Segoe UI,Arial,sans-serif;fill:#e8f0ff}
      .t{font:500 14px Inter,Segoe UI,Arial,sans-serif;fill:#c9d6ec}
      .mono{font:500 12px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;fill:#9fb2d4}
      .small{font:500 13px Inter,Segoe UI,Arial,sans-serif;fill:#d5e1f7}
      .arrow{stroke:#8ea0bf;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="760" fill="url(#bg)"/>

  <text x="48" y="56" class="title">cognitive-os system structure</text>
  <text x="48" y="84" class="sub">Canonical cognitive governance across agents: ontology → memory policy → workflow → runtime sync</text>

  <rect x="48" y="120" width="470" height="290" class="panel"/>
  <text x="72" y="154" class="h">1) Ontological + operational stack</text>
  <text x="72" y="186" class="t">L0 Ontology • L1 Epistemics • L2 Governance</text>
  <text x="72" y="212" class="t">L3 Execution • L4 Orchestration + outcomes</text>
  <text x="72" y="250" class="small">Role files</text>
  <text x="72" y="274" class="mono">core/agents/ontologist.md</text>
  <text x="72" y="296" class="mono">core/agents/epistemic-auditor.md</text>
  <text x="72" y="318" class="mono">core/agents/governance-safety.md</text>
  <text x="72" y="340" class="mono">core/agents/orchestrator.md + domain-owner.md</text>

  <rect x="566" y="120" width="470" height="290" class="panel2"/>
  <text x="590" y="154" class="h">2) Canonical memory + policy</text>
  <text x="590" y="186" class="t">Global memory • Project truth • Episodic evidence</text>
  <text x="590" y="212" class="t">Contracts + schemas define authority and promotion</text>
  <text x="590" y="250" class="small">Canonical sources</text>
  <text x="590" y="274" class="mono">core/memory/global/*.md</text>
  <text x="590" y="296" class="mono">AGENTS.md + docs/* + HARNESS.md</text>
  <text x="590" y="318" class="mono">docs/MEMORY_CONTRACT.md + docs/EVOLUTION_CONTRACT.md</text>
  <text x="590" y="340" class="mono">core/schemas/memory-contract/* + core/schemas/evolution/*</text>

  <rect x="1084" y="120" width="470" height="290" class="panel3"/>
  <text x="1108" y="154" class="h">3) Workflow + accountable evolution</text>
  <text x="1108" y="186" class="t">setup/profile/cognition → detect/harness/new-project</text>
  <text x="1108" y="212" class="t">execute loop (plan → implement → verify → handoff)</text>
  <text x="1108" y="238" class="t">evolve (run → report → promote / rollback)</text>
  <text x="1108" y="276" class="small">Commands</text>
  <text x="1108" y="300" class="mono">cognitive-os setup • new-project • detect • harness apply</text>
  <text x="1108" y="322" class="mono">cognitive-os evolve run/report/promote/rollback</text>

  <path d="M520,265 L560,265" class="arrow"/>
  <path d="M1038,265 L1078,265" class="arrow"/>

  <rect x="176" y="470" width="1248" height="220" class="panel"/>
  <text x="204" y="504" class="h">4) Runtime propagation via cognitive-os sync</text>
  <text x="204" y="530" class="t">Canonical governance is published to each execution surface while preserving local runtime speed.</text>

  <rect x="230" y="558" width="240" height="94" class="panel2"/>
  <text x="325" y="592" class="h">Claude</text>
  <text x="266" y="616" class="small">hooks + skills + context</text>

  <rect x="515" y="558" width="240" height="94" class="panel2"/>
  <text x="613" y="592" class="h">Codex</text>
  <text x="551" y="616" class="small">skills + config + docs</text>

  <rect x="800" y="558" width="240" height="94" class="panel2"/>
  <text x="896" y="592" class="h">Cursor</text>
  <text x="836" y="616" class="small">skills + repo contract</text>

  <rect x="1085" y="558" width="240" height="94" class="panel2"/>
  <text x="1182" y="592" class="h">Hermes</text>
  <text x="1115" y="616" class="small">OPERATOR + skills sync</text>

  <path d="M800,410 L800,468" class="arrow"/>
</svg>

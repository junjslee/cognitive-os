<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120" role="img" aria-label="cognitive-os system overview: kernel, instance, delivery">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1f"/>
      <stop offset="100%" stop-color="#10131f"/>
    </linearGradient>
    <linearGradient id="kernelFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1b3a"/>
      <stop offset="100%" stop-color="#171530"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#8aa0c7"/>
    </marker>
    <style>
      .title { font: 700 38px Inter, -apple-system, Segoe UI, Arial, sans-serif; fill: #f8fafc; }
      .subtitle { font: 500 16px Inter, -apple-system, Segoe UI, Arial, sans-serif; fill: #aeb9d0; letter-spacing: 0.2px; }
      .layer-label { font: 600 13px Inter, -apple-system, Segoe UI, Arial, sans-serif; fill: #8ea2c9; letter-spacing: 1.5px; }
      .kernel-panel { fill: url(#kernelFill); stroke: #6a5bd0; stroke-width: 2; }
      .instance-panel { fill: #131d33; stroke: #32517f; stroke-width: 1.5; }
      .delivery-panel { fill: #0f2230; stroke: #2a5a6e; stroke-width: 1.5; }
      .box { fill: #181a34; stroke: #4c447c; stroke-width: 1.25; }
      .subbox { fill: #151f38; stroke: #34538a; stroke-width: 1.25; }
      .tool { fill: #14233b; stroke: #345078; stroke-width: 1.25; }
      .tool-future { fill: #101a2c; stroke: #3b5178; stroke-width: 1.25; stroke-dasharray: 7 6; }
      .h1 { font: 700 22px Inter, -apple-system, Segoe UI, Arial, sans-serif; fill: #ece9ff; }
      .h2 { font: 700 18px Inter, -apple-system, Segoe UI, Arial, sans-serif; fill: #e8f1ff; }
      .chip { font: 700 11px Inter, -apple-system, Segoe UI, Arial, sans-serif; fill: #c9bdff; letter-spacing: 1.2px; }
      .chip-blue { font: 700 11px Inter, -apple-system, Segoe UI, Arial, sans-serif; fill: #9dc0ff; letter-spacing: 1.2px; }
      .chip-teal { font: 700 11px Inter, -apple-system, Segoe UI, Arial, sans-serif; fill: #9cd8d0; letter-spacing: 1.2px; }
      .hfile { font: 500 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #a49dd2; letter-spacing: 0.3px; }
      .t { font: 500 14px Inter, -apple-system, Segoe UI, Arial, sans-serif; fill: #d3dbf0; }
      .tdim { font: 500 13px Inter, -apple-system, Segoe UI, Arial, sans-serif; fill: #96a3c2; }
      .mono { font: 500 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #a3b5d7; }
      .arrow { stroke: #8aa0c7; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .center { text-anchor: middle; }
      .sync-pill { fill: #2a224d; stroke: #7d6ad9; stroke-width: 1.5; }
      .sync-text { font: 700 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #d9ceff; text-anchor: middle; letter-spacing: 0.5px; }
    </style>
  </defs>

  <rect width="1600" height="1120" fill="url(#bg)"/>

  <text x="42" y="60" class="title">cognitive-os</text>
  <text x="42" y="88" class="subtitle">A portable cognitive kernel for AI agents. The kernel is the spec. Adapters deliver it. The kernel is what travels.</text>

  <text x="60" y="132" class="layer-label">LAYER 1 — THE KERNEL  ·  kernel/  ·  pure markdown, vendor-neutral</text>
  <rect x="60" y="146" width="1480" height="358" rx="14" class="kernel-panel"/>

  <rect x="88" y="176" width="346" height="304" rx="10" class="box"/>
  <text x="108" y="208" class="chip">01 · CONSTITUTION</text>
  <text x="108" y="236" class="h2">Four Principles</text>
  <text x="108" y="268" class="t">I.  Explicit &gt; implicit</text>
  <text x="108" y="294" class="t">II. Orientation precedes observation</text>
  <text x="108" y="320" class="t">III. No model sufficient alone</text>
  <text x="108" y="346" class="t">IV. The loop is the unit of progress</text>
  <text x="108" y="396" class="tdim">Root claim: the danger is not</text>
  <text x="108" y="414" class="tdim">incompetence. It is confident wrongness.</text>
  <text x="108" y="460" class="hfile">kernel/CONSTITUTION.md</text>

  <rect x="448" y="176" width="346" height="304" rx="10" class="box"/>
  <text x="468" y="208" class="chip">02 · REASONING SURFACE</text>
  <text x="468" y="236" class="h2">Operational Protocol</text>
  <text x="468" y="268" class="t">•  Knowns — verifiable now</text>
  <text x="468" y="294" class="t">•  Unknowns — would change the call</text>
  <text x="468" y="320" class="t">•  Assumptions — with falsifiers</text>
  <text x="468" y="346" class="t">•  Disconfirmation — observable outcome</text>
  <text x="468" y="396" class="tdim">Minimum viable explicitness before</text>
  <text x="468" y="414" class="tdim">any consequential decision.</text>
  <text x="468" y="460" class="hfile">kernel/REASONING_SURFACE.md</text>

  <rect x="808" y="176" width="346" height="304" rx="10" class="box"/>
  <text x="828" y="208" class="chip">03 · FAILURE MODES → COUNTERS</text>
  <text x="828" y="236" class="h2">Named Audit Trail</text>
  <text x="828" y="266" class="t">1  Present-only reasoning  →  Unknowns</text>
  <text x="828" y="290" class="t">2  Nearby easier question  →  Core Question</text>
  <text x="828" y="314" class="t">3  First-framing persists  →  Disconfirmation</text>
  <text x="828" y="338" class="t">4  Story-fit over evidence →  fact/infer/pref</text>
  <text x="828" y="362" class="t">5  Effort/risk under-est   →  buffer + fail-first</text>
  <text x="828" y="386" class="t">6  Confidence &gt; accuracy   →  Assumptions + track</text>
  <text x="828" y="424" class="tdim">Every artifact counters a named mode.</text>
  <text x="828" y="460" class="hfile">kernel/FAILURE_MODES.md</text>

  <rect x="1168" y="176" width="346" height="304" rx="10" class="box"/>
  <text x="1188" y="208" class="chip">04 · OPERATOR SCHEMA</text>
  <text x="1188" y="236" class="h2">Portable Preferences</text>
  <text x="1188" y="268" class="t">Workstyle (0–3):</text>
  <text x="1188" y="290" class="tdim">planning · testing · risk · docs · parallel · auto</text>
  <text x="1188" y="318" class="t">Cognition (0–3):</text>
  <text x="1188" y="340" class="tdim">depth · breadth · rigor · challenge · uncertainty</text>
  <text x="1188" y="386" class="tdim">+ MANIFEST.sha256 — integrity pin</text>
  <text x="1188" y="408" class="tdim">+ REFERENCES.md — attribution trail</text>
  <text x="1188" y="460" class="hfile">kernel/OPERATOR_PROFILE_SCHEMA.md</text>

  <text x="60" y="540" class="layer-label">LAYER 2 — INSTANCE + PROJECT TRUTH  ·  what the kernel attaches to</text>
  <rect x="60" y="554" width="1480" height="112" rx="12" class="instance-panel"/>

  <rect x="88" y="580" width="680" height="66" rx="8" class="subbox"/>
  <text x="108" y="606" class="chip-blue">OPERATOR INSTANCE</text>
  <text x="108" y="631" class="mono">core/memory/global/  —  operator_profile.md · cognitive_profile.md · workflow_policy.md</text>

  <rect x="788" y="580" width="724" height="66" rx="8" class="subbox"/>
  <text x="808" y="606" class="chip-blue">PROJECT TRUTH</text>
  <text x="808" y="631" class="mono">docs/  —  REQUIREMENTS · PLAN · PROGRESS · NEXT_STEPS · RUN_CONTEXT · DECISION_STORY</text>

  <rect x="740" y="688" width="120" height="34" rx="17" class="sync-pill"/>
  <text x="800" y="710" class="sync-text">cognitive-os sync</text>

  <text x="60" y="762" class="layer-label">LAYER 3 — DELIVERY  ·  thin adapters inject the kernel into each runtime's native context</text>
  <rect x="60" y="776" width="1480" height="244" rx="14" class="delivery-panel"/>

  <rect x="88" y="806" width="346" height="188" rx="10" class="tool"/>
  <text x="261" y="842" class="h1 center">Claude Code</text>
  <text x="261" y="872" class="t center">CLAUDE.md memory index</text>
  <text x="261" y="896" class="t center">deterministic safety hooks</text>
  <text x="261" y="920" class="t center">agent personas + skills</text>
  <text x="261" y="972" class="hfile center">adapters/claude</text>

  <rect x="448" y="806" width="346" height="188" rx="10" class="tool"/>
  <text x="621" y="842" class="h1 center">Hermes</text>
  <text x="621" y="872" class="t center">OPERATOR.md composite</text>
  <text x="621" y="896" class="t center">SOUL.md identity</text>
  <text x="621" y="920" class="t center">native skills sync</text>
  <text x="621" y="972" class="hfile center">adapters/hermes</text>

  <rect x="808" y="806" width="346" height="188" rx="10" class="tool"/>
  <text x="981" y="842" class="h1 center">OMO / OMX</text>
  <text x="981" y="872" class="t center">agents + skills bundle</text>
  <text x="981" y="896" class="t center">shared governance policy</text>
  <text x="981" y="920" class="t center">Claude-format settings</text>
  <text x="981" y="972" class="hfile center">core/adapters/*.json</text>

  <rect x="1168" y="806" width="346" height="188" rx="10" class="tool-future"/>
  <text x="1341" y="842" class="h1 center">Future runtimes</text>
  <text x="1341" y="872" class="t center">Codex · Cursor · opencode · MCP</text>
  <text x="1341" y="896" class="t center">same markdown kernel</text>
  <text x="1341" y="920" class="t center">~50-line shim per tool</text>
  <text x="1341" y="972" class="hfile center">drop a core/adapters/*.json</text>

  <path d="M800,504 L800,554" class="arrow"/>
  <path d="M800,666 L800,688" class="arrow"/>
  <path d="M800,722 L800,776" class="arrow"/>

  <text x="60" y="1062" class="layer-label">AUTHORITY ORDER</text>
  <text x="60" y="1084" class="t">project truth  &gt;  global operator memory  &gt;  episodic runtime memory        ·        delivery adapters are not authority — they are vessels</text>
  <text x="60" y="1108" class="tdim">Loop: Frame → Decompose → Execute → Verify → Handoff    ·    speed of iteration beats size of any single step (Principle IV)</text>
</svg>
